name: Daily Investment YouTube Digest

on:
  workflow_dispatch:
    # GitHub の Actions 画面から手動実行のみ

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh-pages ブランチへの push に必要

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Checkout gh-pages branch for archive preservation
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-current

      - name: Restore archive and ticker directories
        run: |
          if [ -d gh-pages-current/archive ]; then
            cp -r gh-pages-current/archive docs/archive-old
            rsync -a --ignore-existing docs/archive-old/ docs/archive/
            rm -rf docs/archive-old
          fi
          if [ -d gh-pages-current/ticker ]; then
            cp -r gh-pages-current/ticker docs/ticker-old
            rsync -a --ignore-existing docs/ticker-old/ docs/ticker/
            rm -rf docs/ticker-old
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "digest: ${{ github.run_id }} update"
