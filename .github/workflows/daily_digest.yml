name: Daily Investment YouTube Digest

on:
  workflow_dispatch:
    # GitHub の Actions 画面から手動実行
  schedule:
    - cron: '0 22 * * *'  # 毎日 JST 07:00 (UTC 22:00) に自動実行

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # gh-pages ブランチへの push に必要

    steps:
      - name: Check schedule expiry (auto-stop after 2026-05-10)
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          EXPIRY="2026-05-11"
          if [[ "$TODAY" > "$EXPIRY" ]]; then
            echo "Schedule expired ($TODAY > $EXPIRY). Skipping."
            exit 0
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout gh-pages branch for archive preservation
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-current

      - name: Restore archive and ticker directories
        run: |
          mkdir -p docs/archive docs/ticker
          if [ -d gh-pages-current/archive ]; then
            rsync -a gh-pages-current/archive/ docs/archive/
          fi
          if [ -d gh-pages-current/ticker ]; then
            rsync -a gh-pages-current/ticker/ docs/ticker/
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "digest: ${{ github.run_id }} update"
